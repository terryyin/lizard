# Publish to PyPI when a version tag is pushed (e.g. 1.21.3).
#
# Trusted publishing (recommended): https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#
# PyPI does not match on the JWT `sub` claim. It matches repository, owner,
# repository_owner_id (numeric; see https://api.github.com/users/terryyin → "id"),
# workflow filename parsed from job_workflow_ref (release.yml), and environment
# (must be empty if this job has no `environment:` block).
#
# Tag pushes use a subject like repo:OWNER/REPO:ref:refs/tags/VERSION — that is
# normal GitHub behavior and unrelated to PyPI lookup.
#
# Pre-filled “add publisher” URL (log in as a PyPI owner of `lizard`):
#   https://pypi.org/manage/project/lizard/settings/publishing/?provider=github&owner=terryyin&repository=lizard&workflow_filename=release.yml
#
# Fallback: create a PyPI API token and add repo secret PYPI_API_TOKEN. When set,
# the publish step uses it; when unset, the step uses OIDC (empty password).
#
# Troubleshooting: https://docs.pypi.org/trusted-publishers/troubleshooting/

name: Release — publish to PyPI

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
