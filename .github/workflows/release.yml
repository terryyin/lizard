# Publish to PyPI when a version tag is pushed (e.g. 1.21.3).
#
# One-time PyPI setup (trusted publishing):
# https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#
# PyPI trusted publisher must match the OIDC claims GitHub sends. This workflow
# uses GitHub Environment "pypi", so the subject is:
#   repo:terryyin/lizard:environment:pypi
# Configure at https://pypi.org/manage/project/lizard/publishing/ :
#   - Owner: terryyin
#   - Repository name: lizard
#   - Workflow name: release.yml
#   - Environment name: pypi   <-- required; same as environment: below
# Create the environment in GitHub: repo Settings → Environments → pypi
#
# To use PyPI with no environment instead, delete environment: below and leave
# the Environment name field empty on PyPI (subject becomes repo:terryyin/lizard).
#
# Troubleshooting: https://docs.pypi.org/trusted-publishers/troubleshooting/
#
# Fallback (API token): set repo secret PYPI_API_TOKEN and on the publish step add:
#   with:
#     password: ${{ secrets.PYPI_API_TOKEN }}

name: Release — publish to PyPI

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lizard/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
